<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Ideas Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 32px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f0f0;
  }

  header span {
    font-size: 12px;
    color: #444;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  .column {
    background: #141414;
    border-radius: 12px;
    padding: 16px;
    min-height: 200px;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1f1f1f;
  }

  .column-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .col-raw .column-title   { color: #888; }
  .col-ready .column-title { color: #BA99ED; }
  .col-posted .column-title{ color: #4caf50; }

  .column-count {
    font-size: 11px;
    color: #333;
    background: #1a1a1a;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .card {
    background: #1c1c1c;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .card:hover { border-color: #333; background: #202020; }
  .card.expanded { border-color: #BA99ED44; }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #e8e8e8;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }

  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  .tag-project-personal   { background: #2a2030; color: #BA99ED; }
  .tag-project-clawoop    { background: #1e2535; color: #7aadff; }
  .tag-project-gudink     { background: #1e2a20; color: #6fcf97; }
  .tag-type               { background: #1f1f1f; color: #666; }
  .tag-platform           { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }

  .card-preview {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-body {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #222;
  }

  .card.expanded .card-body { display: block; }
  .card.expanded .card-preview { display: none; }

  .card-copy {
    font-size: 12px;
    color: #aaa;
    line-height: 1.7;
    white-space: pre-wrap;
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.8; }

  .btn-copy    { background: #252525; color: #aaa; }
  .btn-ready   { background: #2a1f40; color: #BA99ED; }
  .btn-posted  { background: #1a2a1a; color: #6fcf97; }
  .btn-raw     { background: #252525; color: #777; }

  .card-date {
    font-size: 10px;
    color: #333;
    margin-top: 10px;
  }

  .col-posted .card { opacity: 0.6; }
  .col-posted .card:hover { opacity: 0.9; }

  .empty-state {
    font-size: 12px;
    color: #2a2a2a;
    text-align: center;
    padding: 32px 0;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1e1e1e;
    border: 1px solid #333;
    color: #aaa;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <h1>Content Ideas Board</h1>
  <span>Twitter/X · LinkedIn</span>
</header>

<div class="board">
  <div class="column col-raw" id="col-raw">
    <div class="column-header">
      <span class="column-title">Raw</span>
      <span class="column-count" id="count-raw">0</span>
    </div>
    <div class="cards" id="cards-raw"></div>
    <div class="empty-state" id="empty-raw" style="display:none">No ideas yet</div>
  </div>
  <div class="column col-ready" id="col-ready">
    <div class="column-header">
      <span class="column-title">Ready</span>
      <span class="column-count" id="count-ready">0</span>
    </div>
    <div class="cards" id="cards-ready"></div>
    <div class="empty-state" id="empty-ready" style="display:none">Nothing queued</div>
  </div>
  <div class="column col-posted" id="col-posted">
    <div class="column-header">
      <span class="column-title">Posted</span>
      <span class="column-count" id="count-posted">0</span>
    </div>
    <div class="cards" id="cards-posted"></div>
    <div class="empty-state" id="empty-posted" style="display:none">Nothing posted yet</div>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

const projectClass = { PERSONAL: 'tag-project-personal', CLAWOOP: 'tag-project-clawoop', GUDINK: 'tag-project-gudink' };

function renderCard(idea) {
  const projects = idea.project.map(p => `<span class="tag ${projectClass[p]}">${p}</span>`).join('');
  const tags = idea.tags.map(t => `<span class="tag tag-type">#${t}</span>`).join('');
  const firstLine = idea.copy.split('\n')[0];

  return `
    <div class="card" id="card-${idea.id}" onclick="toggleCard(${idea.id})">
      <div class="card-title">${idea.title}</div>
      <div class="card-meta">${projects}${tags}</div>
      <div class="card-preview">${firstLine}</div>
      <div class="card-body">
        <div class="card-copy">${idea.copy}</div>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyText(event, ${idea.id})">Copy</button>
          ${idea.status !== 'raw'    ? `<button class="btn btn-raw"    onclick="moveCard(event, ${idea.id}, 'raw')">Move to Raw</button>` : ''}
          ${idea.status !== 'ready'  ? `<button class="btn btn-ready"  onclick="moveCard(event, ${idea.id}, 'ready')">Mark Ready</button>` : ''}
          ${idea.status !== 'posted' ? `<button class="btn btn-posted" onclick="moveCard(event, ${idea.id}, 'posted')">Mark Posted</button>` : ''}
        </div>
        <div class="card-date">${idea.date}</div>
      </div>
    </div>`;
}

function render() {
  ['raw', 'ready', 'posted'].forEach(status => {
    const filtered = ideas.filter(i => i.status === status);
    document.getElementById(`cards-${status}`).innerHTML = filtered.map(renderCard).join('');
    document.getElementById(`count-${status}`).textContent = filtered.length;
    document.getElementById(`empty-${status}`).style.display = filtered.length === 0 ? 'block' : 'none';
  });
}

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('expanded');
}

function moveCard(e, id, status) {
  e.stopPropagation();
  const idea = ideas.find(i => i.id === id);
  idea.status = status;
  render();
  showToast(`Moved to ${status}`);
}

function copyText(e, id) {
  e.stopPropagation();
  const idea = ideas.find(i => i.id === id);
  navigator.clipboard.writeText(idea.copy).then(() => showToast('Copied to clipboard'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
