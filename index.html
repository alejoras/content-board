    margin-bottom: 12px;

    flex-wrap: wrap;

    <div class="card" id="card-${idea.id}" onclick="toggleCard(${idea.id})">
      <div class="card-title">${idea.title}</div>
      <div class="card-meta">${projects}${tags}</div>

        <div class="card-copy">${idea.copy}</div>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyText(event, ${idea.id})">Copy</button>
          ${idea.status !== 'raw'    ? `<button class="btn btn-raw"    onclick="moveCard(event, ${idea.id}, 'raw')">Move to Raw</button>` : ''}
          ${idea.status !== 'ready'  ? `<button class="btn btn-ready"  onclick="moveCard(event, ${idea.id}, 'ready')">Mark Ready</button>` : ''}
          ${idea.status !== 'posted' ? `<button class="btn btn-posted" onclick="moveCard(event, ${idea.id}, 'posted')">Mark Posted</button>` : ''}
        </div>
        <div class="card-date">${idea.date}</div>
      </div>
    </div>`;
}

function render() {
  ['raw', 'ready', 'posted'].forEach(status => {
    const filtered = ideas.filter(i => i.status === status);
    document.getElementById(`cards-${status}`).innerHTML = filtered.map(renderCard).join('');
    document.getElementById(`count-${status}`).textContent = filtered.length;
    document.getElementById(`empty-${status}`).style.display = filtered.length === 0 ? 'block' : 'none';
  });
}

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('expanded');
}

function moveCard(e, id, status) {
  e.stopPropagation();
  const idea = ideas.find(i => i.id === id);
  idea.status = status;
  render();
  showToast(`Moved to ${status}`);
}

function copyText(e, id) {
  e.stopPropagation();
  const idea = ideas.find(i => i.id === id);
  navigator.clipboard.writeText(idea.copy).then(() => showToast('Copied to clipboard'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
